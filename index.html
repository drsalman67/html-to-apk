<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akira AI Markdown-to-PDF</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f43f5e; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .btn-group { display: flex; gap: 10px; }
        h1 { font-size: 1.5rem; color: var(--accent); margin: 0; }
        textarea { width: 100%; height: 500px; background: #0f172a; color: #cbd5e1; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-size: 1.1rem; resize: vertical; box-sizing: border-box; outline: none; line-height: 1.6; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 25px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .help-btn { background: #475569; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 8px; max-width: 500px; width: 90%; color: white; }
        .modal-content code { background: #0f172a; padding: 2px 4px; color: #f43f5e; }
        
        #printArea { display: none; }
        @media print {
            body { background: white; color: black; padding: 0; display: block; }
            .container, .modal { display: none; }
            #printArea { display: block; padding: 20px; font-size: 12pt; line-height: 1.6; }
            #printArea table { width: 100%; border-collapse: collapse; }
            #printArea th, #printArea td { border: 1px solid #ccc; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="btn-group">
            <button class="help-btn" onclick="toggleModal(true)">?</button>
            <h1>Akira AI Parser</h1>
        </div>
        <button class="btn" onclick="generateStyledPDF()">Print & Save PDF</button>
    </div>

    <textarea id="textInput" dir="auto" placeholder="Paste your AI chat here..." maxlength="100000"></textarea>
    <div class="footer-info"><span id="charCount">Characters: 0 / 100,000</span></div>
</div>

<div id="helpModal" class="modal">
    <div class="modal-content">
        <h2>Formatting Cheat Sheet</h2>
        <p><b>Bold:</b> <code>**text**</code> | <b>Italic:</b> <code>*text*</code></p>
        <p><b>H1 Header:</b> <code># text</code> | <b>List:</b> <code>- item</code></p>
        <p><b>Code:</b> <code>`code`</code> | <b>Quote:</b> <code>> text</code></p>
        <p><b>Table:</b> <code>| Col1 | Col2 |</code></p>
        <button class="btn" onclick="toggleModal(false)">Close</button>
    </div>
</div>

<div id="printArea" dir="auto"></div>

<script>
    const textarea = document.getElementById('textInput');
    const printArea = document.getElementById('printArea');
    function toggleModal(show) { document.getElementById('helpModal').style.display = show ? 'flex' : 'none'; }
    marked.setOptions({ breaks: true, gfm: true });
    
    function generateStyledPDF() {
        const rawText = textarea.value;
        if (!rawText.trim()) return alert("Bhai, khali page ka PDF nahi ban sakta!");
        printArea.innerHTML = marked.parse(rawText);
        window.print();
    }
</script>
</body>
</html>
